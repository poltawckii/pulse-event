services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
      POSTGRES_DB: event_pulse
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://event_user:event_pass@db:5432/event_pulse
      JWT_SECRET: ${JWT_SECRET}
      YANDEX_GEOCODER_KEY: ${YANDEX_GEOCODER_KEY}
    depends_on:
      - db

  client:
    build:
      context: ./client
      args:
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  db_data:
