services:
  db:
    image: postgis/postgis:16-3.4
    container_name: event_pulse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
      POSTGRES_DB: event_pulse
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
